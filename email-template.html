<!DOCTYPE html>
<!--
  Fill in:
  {{name}}          — recipient’s first name
  {{product_name}}  — e.g. Email Assistant
  {{support_email}} — e.g. you@yourdomain.com
-->
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome</title>
</head>

<body style="
      margin: 0;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      color: #222;
      background: #f6f6f6;
    ">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
        <tr>
            <td align="center">
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="
              max-width: 480px;
              background: #fff;
              border: 1px solid #e5e5e5;
              border-radius: 8px;
              padding: 28px 24px;
              text-align: left;
            ">
                    <tr>
                        <td>
                            <h1 style="margin: 0 0 12px; font-size: 22px; line-height: 1.3; color: #111">
                                Welcome, {{name}}!
                            </h1>
                            <p style="margin: 0 0 16px; color: #333">
                                Thanks for trying <strong>{{product_name}}</strong>. Reply to this email anytime
                                — we’re happy to help.
                            </p>
                            <p style="margin: 0; color: #555; font-size: 14px">
                                Questions?
                                <a href="mailto:{{support_email}}" style="color: #111">Email us</a>.
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>

</html>
